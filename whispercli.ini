[default]
dbfile = .\data.db

[whisper]
# Model size / quality level. Larger = more accurate but slower.
# Options: tiny(.en), base(.en), small(.en), medium(.en),
#          large-v1, large-v2, large-v3, turbo
model = base.en

# Language of the audio (leave blank to auto-detect).
language = english

# Use half precision (fp16). True is faster on GPU; must be False on CPU.
fp16 = False

# Print progress/partial results during transcription.
verbose = False

# Beam search width. Higher = more accurate, slower. Blank = greedy decoding.
beam_size =

# Number of candidates sampled when temperature > 0. Blank = library default.
best_of =

# Bias vocabulary/spelling with an initial prompt. Blank = none.
initial_prompt =
